name: Build installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Build
        working-directory: app
        run: |
          npm ci
          npx electron-vite build
          npx electron-builder --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: mac
          path: |
            app/dist/*.dmg
            app/dist/*.dmg.blockmap
            app/dist/latest-mac.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Build
        working-directory: app
        run: |
          npm ci
          npx electron-vite build
          npx electron-builder --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            app/dist/*.exe
            app/dist/*.exe.blockmap
            app/dist/latest.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install system deps
        run: sudo apt-get install -y libxtst-dev libpng-dev
      - name: Build
        working-directory: app
        run: |
          npm ci
          npx electron-vite build
          npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            app/dist/*.AppImage
            app/dist/latest-linux.yml

  # Один job создаёт релиз со всеми файлами — нет race condition
  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
