appId: com.remoteaccess.app
productName: RemoteAccess
copyright: Copyright © 2026

# Распаковать нативные модули из asar (нужно для robotjs и node-pty)
asarUnpack:
  - "node_modules/@jitsi/robotjs/**"
  - "node_modules/node-pty/**"
  - "node_modules/@serialport/**"

# Откуда брать обновления — GitHub Releases
publish:
  provider: github
  owner: higroupkz-bot
  repo: remote-access
  releaseType: release

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - node_modules/**/*
  - package.json

# ── macOS ────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]   # Intel + Apple Silicon
  category: public.app-category.utilities
  # Без подписи — для личного использования этого достаточно
  identity: null

dmg:
  title: Remote Access
  window:
    width: 540
    height: 380

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  artifactName: "${productName}-Setup-${version}.exe"

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Utility
